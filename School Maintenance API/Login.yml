info:
  name: Login
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "isaac@school.edu",
        "password": "Password123!"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Automatically extract and save the token upon a successful login
        if (res.getStatus() === 200 && res.getBody().token) {
            bru.setEnvVar("jwtToken", res.getBody().token);
            console.log(" Token successfully saved to environment!");
        } else if (res.getStatus() === 200 && res.getBody().accessToken) {
            // Fallback if your payload property is named 'accessToken'
            bru.setEnvVar("jwtToken", res.getBody().accessToken);
            console.log("Access Token successfully saved to environment!");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
